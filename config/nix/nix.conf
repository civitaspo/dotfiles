# User-level Nix configuration. Symlinked to ~/.config/nix/nix.conf by
# home-manager.
#
# nix-darwin runs with `nix.enable = false` (the Determinate Systems
# installer owns the daemon), so /etc/nix/nix.conf is no longer managed
# by nix-darwin. This file restores the per-user settings the project
# needs.

experimental-features = nix-command flakes
