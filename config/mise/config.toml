# Tool versions managed by mise.
# Symlinked to ~/.config/mise/config.toml by home-manager.
#
# mise owns most CLI binaries. Some language runtimes (Python, Node.js, Go)
# and tools (Terraform, process-compose, k6) are pinned through dedicated
# nixpkgs inputs instead -- see flake.nix.

[settings]
# Consume the committed lockfile during normal installs. This keeps "latest"
# declarations reproducible and avoids writing the home-manager-managed
# lockfile under /nix/store.
locked = true

[tools]
# --- Language runtimes (others come from Nix; see flake.nix) ----------------
# Ruby versions are managed by rv instead of mise's core Ruby backend.
"aqua:spinel-coop/rv" = "latest"
rust = "latest"
deno = "latest"
java = "temurin-21"

# --- CLI tools (formerly aqua) ----------------------------------------------
1password-cli = "latest"
aqua = "latest"
"aqua:marp-team/marp-cli" = "latest"
# pnpm via npm (aqua-registry's pnpm asset name does not match upstream on macOS).
"npm:pnpm" = "latest"
"aqua:aws/aws-cli" = "latest"
"aqua:astral-sh/ruff" = "latest"
"aqua:astral-sh/uv" = "latest"
"aqua:go-task/task" = "latest"
"aqua:junegunn/fzf" = "latest"
"aqua:sharkdp/bat" = "latest"
"aqua:sharkdp/fd" = "latest"
# btop does not publish macOS release assets; bottom provides a portable TUI monitor.
"aqua:ClementTsang/bottom" = "0.14.6"
"aqua:dandavison/delta" = "latest"
eza = "latest"
"aqua:cli/cli" = "latest"
"aqua:x-motemen/ghq" = "latest"
"aqua:jqlang/jq" = "latest"
"aqua:jesseduffield/lazygit" = "latest"
"aqua:neovim/neovim" = "latest"
"aqua:BurntSushi/ripgrep" = "latest"
"aqua:starship/starship" = "latest"
"aqua:ajeetdsouza/zoxide" = "latest"
"aqua:atuinsh/atuin" = "latest"
"aqua:direnv/direnv" = "latest"
"aqua:k1LoW/deck" = "latest"
"github:k1LoW/mo" = "latest"
"aqua:aws/session-manager-plugin" = "latest"
"aqua:crate-ci/typos" = "latest"
"aqua:koalaman/shellcheck" = "latest"
"aqua:mvdan/sh" = "latest"
"aqua:evilmartians/lefthook" = "latest"
"cargo:deadnix" = "latest"

# --- Docker client tooling --------------------------------------------------
"aqua:docker/cli" = "latest"
"aqua:docker/compose" = "latest"
"aqua:docker/buildx" = "latest"
"ubi:docker/docker-credential-helpers[exe=docker-credential-osxkeychain]" = "latest"

# --- Container runtime (replaces the Homebrew colima formula) ---------------
"aqua:abiosoft/colima" = "latest"
"aqua:lima-vm/lima" = "latest"

# --- Data tools -------------------------------------------------------------
# Embedded analytics DB: query CSV/Parquet/JSON and remote S3 directly via SQL.
"aqua:duckdb/duckdb" = "latest"

# --- Modern coreutils replacements ------------------------------------------
"aqua:dalance/procs" = "latest"
"aqua:bootandy/dust" = "latest"

# --- Cloud SDKs -------------------------------------------------------------
gcloud = "latest"

# --- AI agent CLIs ----------------------------------------------------------
claude-code = "latest"
codex = "latest"
# Inline review UI for agent plans/diffs (https://crit.md/).
"github:tomasz-tomczyk/crit" = "latest"

[tools."http:antigravity-cli"]
version = "1.0.3"
url = "https://storage.googleapis.com/antigravity-public/antigravity-cli/1.0.3-6260531212976128/darwin-arm/cli_mac_arm64.tar.gz"
checksum = "sha512:b2c0d21876ae9b6faf6164b15b573d76e379f643e040e77d528ebafa5d5bd8893cc3c8ebd9a78faf67bd7c676dd4bff0f028f3bbb508e544769d61de3da6b8b1"
rename_exe = "agy"
