# Task runner for civitaspo/dotfiles.
# https://taskfile.dev
#
# init.sh handles first-time bootstrap; every other workflow lives here.
# Dotfile placement is owned by home-manager (nix/home.nix), so `switch`
# applies it. Homebrew is intentionally NOT on the user's $PATH; the brew
# tasks call /opt/homebrew/bin/brew directly.
version: '3'

tasks:
  default:
    desc: List available tasks.
    cmds:
      - task --list
    silent: true

  reconcile:
    desc: Apply the whole configuration to this machine.
    cmds:
      - task: switch
      - task: brew
      - task: mise

  switch:
    desc: Activate nix-darwin and home-manager (this also links dotfiles).
    # Build as the invoking user so git+ssh flake inputs (dotfiles-private)
    # can use the user SSH agent; sudo alone has no access to it. Then set
    # the system profile and activate as root.
    # See: https://github.com/nix-darwin/nix-darwin/issues/1471
    cmds:
      - darwin-rebuild build --flake ".#aarch64-darwin"
      - sudo nix-env -p /nix/var/nix/profiles/system --set ./result
      - sudo ./result/activate

  brew:
    desc: Apply the Brewfile (install, upgrade, and remove unlisted packages).
    cmds:
      - task: brew:tap
      - /opt/homebrew/bin/brew bundle --file ./Brewfile --force-cleanup

  brew:tap:
    desc: Retarget civitaspo/dotfiles at this checkout and sync Casks/.
    # Always recreate: brew bundle skips already-installed taps, so a stale or
    # corrupt clone can miss Casks/ and break Homebrew 6 path-based trust.
    vars:
      TAP: civitaspo/dotfiles
      TAP_PATH:
        sh: /opt/homebrew/bin/brew --repo {{.TAP}}
    cmds:
      - cmd: brew untap --force {{.TAP}}
        ignore_error: true
      - cmd: rm -rf '{{.TAP_PATH}}'
        if: test -e '{{.TAP_PATH}}'
      - /opt/homebrew/bin/brew tap --custom-remote {{.TAP}} {{.TASKFILE_DIR}}
      - /opt/homebrew/bin/brew trust {{.TASKFILE_DIR}}

  mise:
    desc: Install tool versions with mise.
    cmds:
      - mise install

  update:
    desc: Update all dependencies (nix, mise, Homebrew).
    cmds:
      - task: update:nix
      - task: update:mise
      - task: update:brew

  update:nix:
    desc: Update flake inputs and re-activate nix-darwin.
    cmds:
      - nix flake update
      - task: switch

  update:mise:
    desc: Upgrade mise-managed tools and drop unused versions.
    dir: ./config/mise
    env:
      MISE_GLOBAL_CONFIG_FILE: '{{.TASKFILE_DIR}}/config/mise/config.toml'
      MISE_GLOBAL_CONFIG_ROOT: '{{.TASKFILE_DIR}}/config/mise'
      MISE_LOCKED: 'false'
    cmds:
      - mise upgrade
      - mise prune

  lock:mise:
    desc: Refresh the committed mise lockfile.
    dir: ./config/mise
    env:
      MISE_GLOBAL_CONFIG_FILE: '{{.TASKFILE_DIR}}/config/mise/config.toml'
      MISE_GLOBAL_CONFIG_ROOT: '{{.TASKFILE_DIR}}/config/mise'
      MISE_LOCKED: 'false'
    cmds:
      - mise lock --global --platform macos-arm64

  update:brew:
    desc: Upgrade Homebrew packages.
    cmds:
      - /opt/homebrew/bin/brew update
      - /opt/homebrew/bin/brew upgrade
      - task: brew:tap
      - /opt/homebrew/bin/brew bundle --file ./Brewfile --force-cleanup
      - /opt/homebrew/bin/brew cleanup

  import:brew:
    desc: Capture the live Homebrew state back into the Brewfile.
    cmds:
      # --no-vscode keeps VS Code / Cursor extension entries out of the file.
      - /opt/homebrew/bin/brew bundle dump --force --no-vscode --file ./Brewfile

  check:
    desc: Validate the configuration.
    cmds:
      - task: check:nix
      - task: check:nix-lint
      - task: check:shell
      - task: check:typos

  check:nix:
    desc: Validate the nix-darwin configuration.
    cmds:
      - nix flake check

  check:nix-lint:
    desc: Lint Nix files.
    cmds:
      - deadnix --fail .
      - nix run --inputs-from . nixpkgs#statix -- check .

  check:shell:
    desc: Lint and format-check shell scripts.
    cmds:
      - shellcheck init.sh home/bin/* home/.docker/cli-plugins/*
      - shfmt -d -i 2 -ci init.sh home/bin/* home/.docker/cli-plugins/*

  check:typos:
    desc: Check spelling in source files.
    cmds:
      - typos
